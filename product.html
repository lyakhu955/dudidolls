<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dudidolls — bambola</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<style>
/* Product page extras */
.product-page { min-height: 100vh; padding: 88px 32px 0; }
.product-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding: 64px 0 80px;
  max-width: 1200px;
  margin: 0 auto;
}
.product-gallery { display: flex; flex-direction: column; gap: 16px; }
.product-main-img {
  position: relative; aspect-ratio: 3/4; overflow: hidden; border-radius: 4px;
  box-shadow: 0 10px 24px -8px rgba(28,25,22,0.3), inset 0 0 0 1px rgba(28,25,22,0.06);
}
.product-thumbs { display: flex; gap: 12px; }
.product-thumb {
  position: relative; width: 80px; height: 80px; border-radius: 4px; overflow: hidden;
  cursor: pointer; box-shadow: inset 0 0 0 1px rgba(28,25,22,0.08);
}
.product-thumb:hover { box-shadow: inset 0 0 0 1px var(--accent); }

.product-info { display: flex; flex-direction: column; gap: 24px; padding-top: 12px; }
.product-eyebrow {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.product-name {
  font-family: var(--serif); font-size: clamp(48px, 6vw, 80px);
  line-height: 0.95; letter-spacing: -0.025em;
}
.product-name .it { font-style: italic; color: var(--accent); }
.product-desc {
  font-size: 16px; line-height: 1.65; color: var(--ink-2); max-width: 44ch;
}
.product-spec {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px 32px;
  padding: 20px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
}
.product-spec dt {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.product-spec dd { font-size: 14px; margin-top: 2px; }
.product-price-row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-top: auto; padding-top: 16px;
}
.product-price { font-family: var(--serif); font-size: 48px; letter-spacing: -0.02em; }

/* Others section */
.others { padding: 80px 32px 120px; border-top: 1px solid var(--line); }
.others-head {
  display: grid; grid-template-columns: auto 1fr auto; align-items: end;
  padding-bottom: 48px; gap: 24px;
}
.others-head .index { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.others-head .title { font-family: var(--serif); font-size: clamp(32px, 4vw, 56px); letter-spacing: -0.025em; line-height: 0.95; }
.others-head .title .it { font-style: italic; }
.others-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.others-grid .card-img { aspect-ratio: 3/4; }

@media (max-width: 900px) {
  .product-wrap { grid-template-columns: 1fr; padding-top: 32px; }
  .others-grid { grid-template-columns: repeat(2, 1fr); }
  .product-price-row { flex-direction: column; gap: 16px; align-items: flex-start; }
}

@media (max-width: 768px) {
  .product-page { padding: 72px 20px 0; }
  .product-wrap { gap: 36px; padding: 40px 0 60px; }
  .product-main-img { aspect-ratio: 3/3.5; }
  .product-thumbs { gap: 10px; }
  .product-thumb { width: 64px; height: 64px; }
  .product-name { font-size: clamp(40px, 10vw, 64px); }
  .product-desc { font-size: 15px; max-width: 100%; }
  .product-price { font-size: 36px; }
  .others { padding: 60px 20px 80px; }
  .others-head { grid-template-columns: 1fr; gap: 8px; padding-bottom: 36px; }
  .others-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
}

@media (max-width: 480px) {
  .product-page { padding: 64px 16px 0; }
  .product-wrap { gap: 28px; padding: 28px 0 48px; }
  .product-main-img { aspect-ratio: 1/1; }
  .product-thumbs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .product-thumb { width: 100%; height: auto; aspect-ratio: 1/1; }
  .product-info { gap: 16px; padding-top: 0; }
  .product-name { font-size: clamp(36px, 12vw, 52px); }
  .product-desc { font-size: 14px; }
  .product-spec { grid-template-columns: 1fr; gap: 10px 0; }
  .product-price-row { flex-direction: column; gap: 12px; align-items: flex-start; }
  .product-price { font-size: 32px; }
  .others { padding: 48px 16px 64px; }
  .others-head { padding-bottom: 28px; }
  .others-grid { grid-template-columns: 1fr; gap: 16px; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="product-app.jsx"></script>
</body>
</html>
